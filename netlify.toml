[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

# Security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# The daily all-platform refresh is a scheduled function — its cron lives in
# netlify/functions/daily-refresh.mts (export const config.schedule = "0 9 * * *").
